server:
  port: 8080

spring:
  application:
    name: instant-chat
  datasource:
    url: jdbc:mysql://localhost:3306/instant_chat?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传路径配置
upload:
  path: D:/tomcat/webapps/Big-work/backend/instant-chat/uploads

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: InstantChatSecretKey2024ForJWTTokenGenerationAndValidation
  expiration: 604800000

websocket:
  allowed-origins: "*"

logging:
  level:
    com.instantchat: DEBUG
    org.springframework.web.socket: DEBUG